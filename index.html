<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>quill</title>

    <meta
      name="description"
      content="a blog pages"
    />

    <link rel="stylesheet" href="css/style.css" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container">
      <!-- Navigation -->

      <header class="navbar">
        <a href="index.html" class="logo"> quill </a>

        <nav>
          <a href="posts.html">Posts</a>

          <a href="about.html">About</a>

          <a href="https://github.com/imunknown7/quill" target="_blank"> GitHub </a>
        </nav>
      </header>

      <!-- Hero -->

      <section class="hero">
        <div class="hero-avatar">
          <img src="assets/images/pfp.png" alt="dyno" />
        </div>

        <div class="hero-content">
          <h1>Hi, This is quill.</h1>

          <p>
            A minimal markdown powered personal blog built along with support of
            tags, frontmatter, search and code syntax highlighting.
          </p>
        </div>
      </section>

      <!-- Latest Articles -->

      <section class="latest-posts">
        <div class="section-header">
          <h2>Latest Writing</h2>

          <a href="posts.html"> View all → </a>
        </div>

        <div id="posts-list">
          <!-- JavaScript injects posts here -->
        </div>
      </section>

      <section class="topics-section">
        <h2>Topics</h2>

        <div id="topics-list"></div>
      </section>
      <!-- Quote -->

      <section class="quote">
        <blockquote>"Write in Markdown. Build. Publish."</blockquote>
      </section>

      <!-- Footer -->

      <footer>
        <div>© 2026 dynamo</div>

        <div class="footer-links">
          <a href="https://github.com/imunknown7/quill"> GitHub </a>

          <a href="https://linkedin.com/in/yourusername"> LinkedIn </a>

          <a href="mailto:you@example.com"> Email </a>
        </div>
      </footer>
    </div>

    <script src="js/topics.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
